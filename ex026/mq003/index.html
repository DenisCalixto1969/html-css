<!DOCTYPE html>
<html pt="br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Media Querie Declaraçoes</title>
    <style>
   /* vamos fazer as declaraçoes gerais , as para posição retrato e paisagem dentro desse mesmo arquivo*/
   /* O IDEAL É FAZER EM ARQUIVOS CSS SEPARADOS COMO NO EXERCICIO ANTERIOR MQ002*/
        *{
            margin: 0px;
            padding: 0px;
            font-family: Arial, Helvetica, sans-serif;
        }
        html, body{
            width:100vw;
            height: 100vh;
            background-color: rgb(0, 247, 255);
            background-size: contain;
            background-repeat: no-repeat;
            
        }
        h1{
            color: white;
            padding: 10px;
        }

        @media screen and (orientation: portrait) {                        
            body{
            background: url(../imagens/cev-portrait.jpg);
            background-position: center bottom;}          
        }
      
        @media screen and (orientation: landscape) {
            body{
            background-image: url(../imagens/cev-landscape.jpg);
            background-position: left bottom;}
        }

    </style>


</head>
<body>
    <h1>Mude a orientação do seu dispositvo</h1>
</body>
</html>
