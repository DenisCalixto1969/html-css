<body>
    <h1>imangens dinamicas</h1>
    <p>tente abrir esse site em varios dispositivos diferentes ou diminua ou aumente o tamanho do seu navegador</p>
    <picture>
        
        <source media="(max-width:750px)" srcset="imagens/imagemP.png" type="image/png">
        <source media="(max-width:1050px)" srcset="imagens/imagemM.png" type="image/png">
        <img src="imagens/imagemG.png" alt="imagem flexivel">
        <!-- serve para usar as telas em celular e pc por exemplo imagems grande, medias e pequenas-->
    </picture>
    
    <h1>Vamos aprender a reproduzir um audio</h1>
      
      <audio preload="metadata" autoplay controls>
        
        <source src="midia/ABBA GOLD - Knowing m, Knowing you.mp3" type="audio/mpeg">

      </audio>
