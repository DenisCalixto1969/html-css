<!DOCTYPE html>
<html pt="br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>form 007</title>
</head>
<body>
    
     <form action="pagina001.html" method="post" autocomplete="on">

        <p>
            <label for="iestado">Estado</label>
            <select name="estado" id="iestado"><br>
               
                <option value="" selected> -------Escolha------</option>
               
                <optgroup label="Região Sudeste">
                    <option value="SP">São Paulo</option>
                    <option value="MG">Minas Gerais</option>
                    <option value="RJ">Rio de Janeiro</option>
                </optgroup>
                
                
                <optgroup label="Regiao Norte">
                    <option value="BA">Bahia</option>
                    <option value="PE">Pernambuco</option>
                    <option value="RN">Rio Grande do Norte</option>
                </optgroup>                        
                
            </select>
        </p>
        
        <p>
            <label for="iprofissao">Profissao</label>
            <input type="text" name="profissao" id="iprofissao" list="listaprofissao">
                
            <datalist id="listaprofissao">
                <option value="ADM">Administrador</option>
                <option value="PM">Policial Militar</option>
                <option value="PP">Policial Penal</option>
            </datalist>

        </p>

        <p>
            <label for="msg">Mensagem:</label>
            <textarea name="mensagem" id="imensagem" cols="30" rows="10"></textarea>

        </p>    

        <p>
            <input type="submit" value="Enviar">
            <input type="reset" value="Limpar">
        </p>

    </form>
</body>
</html>
