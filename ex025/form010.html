<!DOCTYPE html>
<html pt="br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Form 010</title>
</head>
<body>
    <h1> Formulario 010 - com funcao em javascript</h1>
    
    <form action="pagina001.html" method="post" autocomplete="on">

    <p>
       <label for="iano">Em que ano vc nasceu?</label>
       <input type="number" name="ano" id="iano" min="1900" max="2026" value="2026"
        oninput="calculoIdade()">
      
    </p>
       <label for="iidade">Nesse ano eu completo:</label>
       <output id="iidade">0</output>

    <p>
        <input type="submit" value="Enviar">
        <input type="reset" value="Limpar">
    </p>

    </form>

    <script>
             function calculoIdade() {
                var idadeatual = new Date().getFullYear()
                iidade.innerHTML = Number(idadeatual) - Number(iano.value)                
             }

    </script>
    


</body>
</html>
