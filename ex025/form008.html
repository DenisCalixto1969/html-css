    <title>Form 008</title>
</head>
<body>
    <h1>Formularios output</h1>

    <form action="pagina001.html" method="post" autocomplete="on">
        <p>
            <label for="inumero1">Numero 1</label>
            <input type="number" name="numero1" id="inumero1" min="0" max="50" required
             oninput="isoma.innerHTML = Number(inumero1.value) + Number (inumero2.value)">
        </p>

        <p>
            <label for="inumero2">Numero 2</label>
            <input type="number" name="numero2" id="inumero2" min="0" max="50" required 
            oninput="isoma.innerHTML=Number(inumero1.value) + Number (inumero2.value)" >
        </p>
            <label for="isoma">Soma</label>
            <output name="soma" id="isoma">0</output>

        <p>
            <input type="submit" value="Enviar">
            <input type="reset" value="Limpar">
        </p>

    </form>
    
    
</body>
