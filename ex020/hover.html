<!DOCTYPE html>
<html pt="br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Exemplo de Hover (mostra paragrafo escondido, muda cor etc...</title>
    <style>
        body{
            font-family: Arial, Helvetica, sans-serif;
        }
        div > p {
            display: none;
        }
        div:hover > p {
            display: block;
            color: rgb(57, 16, 206);
            background-color: rgb(112, 148, 28);
            width: 300px;
        }
        div:hover {
            color: red;
        }
    </style>
</head>
<body>
        <h1>Exemplo de hover - div > p é um paragrafo filho que esta dentro da div</h1>
        <p>Passe o mouse sobre o texto abaixo</p>
        <div>
            Passe o mouse aqui!!!
            <p>TEXTO ESCONDIDO</p>
        </div>
     <P>FIM DO EXERCICIO </P>
</body>
</html>
