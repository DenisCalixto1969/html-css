<!DOCTYPE html>
<html pt="br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Personalizando listas</title>
    <style>
         body {
            font-family: Arial, Helvetica, sans-serif;
         }
         a {
            color: red;
            text-decoration: none;
            font-weight: bold;
         }
         a:visited {
            color: blue;
         }
         a:hover {
            color: black;
            text-decoration: underline;
         }
         a:active {
            color: rgb(236, 202, 10);
         }
         .especial {
            background-color:rgb(176, 168, 185);
         }

         .especial a::after {
            content:'[link]';
            text-decoration: none;
            color: darkgray;
            font-weight: normal;
            
         }

    </style>
</head>
<body>
    <ul>
    <li><a href="https://gustavoguanabara.github.io" target="_blank" class="especial">Repositorio github</a></li>
    <li><a href="https://youtube.com/cursoemvideo" target="_blank">Canal do you tube</a></li>
    <li><a href="https://www.cursoemvideo.com" target="_blank">Site do Curso em Video</a></li>
    </ul>
</body>
</html>
