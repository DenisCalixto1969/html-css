         flex: 0 0 150px
        }

        div#cxB{
         /* flex-shrink:0 ; */ 
         /* flex-grow: 1; */ 
         /* flex-basis: 250px */
         flex: 1 0 250px;
        }

        divcxdC{
         /* flex-shrink:0  ;*/ 
         /* flex-grow: 0; */ 
         /* flex-basis: 250px */
         flex: 0 0 250px;
        }

    </style>
</head>
<body>
    <div class="caixamae">
        <div class="item"id=cxA>A</div>
