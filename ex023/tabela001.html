<!DOCTYPE html>
<html pt="br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tabelas Simples</title>
    <style>
        body{
            font-family: Arial, Helvetica, sans-serif;            
        }
        table {
            width: 400px;  
            height: 400PX;
            border-collapse: collapse;  /* para juntar as bordas */
        }
        td {
            border: 1px solid black;
            padding: 8px;
            text-align: center; /* alinhamento horizontal*/
            vertical-align: top ; /* alinhamento vertical */
        }
        .numero { /* classe para alinhar os dados numero e a seguinte caracteres*/
            text-align: right;
        }
        .caracter{
            text-align: left;
        }
      
       
        
    </style>
</head>
<body>
    <h1>minha primeira tabela</h1>
   <!-- tabelas simples Table(tabela) - Table Row(linha de tabela) - Table header(cabeçalho de tabela) - table data (dados de tabela) -->

    <table>
        <tr> <!-- primeira linha-->
            <td>A1</td>
            <td>B1</td>
            <td>C1</td>
        </tr>

        <tr > <!-- segunda linha-->
            <td class="caracter">A2</td>
            <td>B2</td>
            <td class="numero">C2</td>
        </tr>

        <tr> <!-- terceira linha-->
            <td class="caracter">A3</td>
            <td>B3</td>
            <td class="numero">C3</td>
        </tr>

        <tr> <!-- quarta linha-->
            <td>A4</td>
            <td>B4</td>
            <td >C4</td>
        </tr>
    </table>
    
</body>
</html>
