<!DOCTYPE html>
<html pt="br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Modelo de Caixa</title>
    <style>
        h1{
            background-color: azure;
            height: 300px;
            width: 300px;
           
            border-width: 10px;
            border-style: solid;
            border-color: brown;

            padding-top: 10px;
            padding-right: 10px;
            padding-bottom: 10px;
            padding-left: 10px;
            
        <!--   pode simplificar nessa ordem borde: 10px solid brow    no padding: 20px 20px 44px 20px;-->
            margin-top: 20px;
            margin-right: 20px;
            margin-bottom: 44px;
            margin-left: 20px;
            

            outline-width: 5px;
            outline-style: dashed;
            outline-color: salmon;
            }
        a {
            border-width: 10px;
            border-style: solid;
            border-color: red;

            padding-top: 10px;
            padding-right: 10px;
            padding-bottom: 10px;
            padding-left: 10px;
            
        }
    </style>
</head>
<body>
    <h1>Exemplo de Caixa box-level</h1>
    
        <p>Paragrafos tambem são exemplos de box-level, mas <a href="#">links são exemplos de caixas inline-leve </a> Vamos ver como tudo isso funciona </p> 
    
</body>
</html>
